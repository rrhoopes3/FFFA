name: Process Bill

on:
  workflow_call:
    inputs:
      bill_ids:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      bill_ids:
        description: 'Comma-separated bill IDs (e.g., 118-hr-4366)'
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: omnibus-site
        run: npm ci

      - name: Fetch bill XML
        working-directory: omnibus-site
        run: node scripts/fetch-xml.js "${{ inputs.bill_ids }}"

      - name: Parse bill structure
        working-directory: omnibus-site
        run: |
          IFS=',' read -ra IDS <<< "${{ inputs.bill_ids }}"
          for id in "${IDS[@]}"; do
            node scripts/parse-bill.js "$id"
          done

      - name: Generate AI summaries
        working-directory: omnibus-site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'claude' }}
        run: |
          IFS=',' read -ra IDS <<< "${{ inputs.bill_ids }}"
          for id in "${IDS[@]}"; do
            node scripts/summarize.js "$id"
          done

      - name: Build static site
        working-directory: omnibus-site
        run: node scripts/build-site.js

      - name: Commit data and summaries
        run: |
          git config user.name "OmnibusAI Bot"
          git config user.email "bot@omnibusai.info"
          git add omnibus-site/data/
          git diff --staged --quiet || git commit -m "feat: processed bills - ${{ inputs.bill_ids }}"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy omnibus-site/public --project-name=omnibusai
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: omnibus-site/public/
          retention-days: 30
